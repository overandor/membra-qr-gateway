name: Deploy — GitHub Pages (UI)

# Builds the Vite UI and publishes it to GitHub Pages.
# No external API key required: this uses the built-in GITHUB_TOKEN that
# GitHub provisions for the workflow run. To activate, set the repository's
# Pages source to "GitHub Actions" (Settings → Pages → Build and deployment).
on:
  push:
    branches:
      - main
      - claude/membra-money-protocol-Cm4Fy
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow the workflow to mint an id-token and write to the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Auto-enables Pages (build type: GitHub Actions) using the built-in
      # token, so no manual Settings -> Pages toggle is required.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build (Pages subpath base)
        env:
          # Project Pages sites are served from /<repo>/, so assets must be
          # emitted under that base. Vercel/root deploys leave VITE_BASE unset.
          VITE_BASE: /membra-qr-gateway/
        run: npm run build

      - name: Add SPA fallback (404 -> index)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

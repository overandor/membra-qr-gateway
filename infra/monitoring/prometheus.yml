global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    service: membra-qr-gateway
    environment: production

# ── Alertmanager connection ───────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:
  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ── MEMBRA API (FastAPI + prometheus-fastapi-instrumentator) ───────────────
  - job_name: membra-api
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:7860
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: membra-api

  # ── Node exporter (host metrics: CPU, memory, disk, network) ──────────────
  - job_name: node-exporter
    scrape_interval: 30s
    static_configs:
      - targets:
          - node-exporter:9100
    relabel_configs:
      - target_label: service
        replacement: node-exporter

  # ── Cadvisor (Docker container metrics) ───────────────────────────────────
  - job_name: cadvisor
    scrape_interval: 30s
    static_configs:
      - targets:
          - cadvisor:8080
    metric_relabel_configs:
      # Keep only membra container metrics
      - source_labels: [container_label_com_docker_compose_service]
        regex: membra.*
        action: keep

  # ── Nginx (via nginx-prometheus-exporter) ─────────────────────────────────
  - job_name: nginx
    scrape_interval: 30s
    static_configs:
      - targets:
          - nginx-exporter:9113
    relabel_configs:
      - target_label: service
        replacement: nginx

# ── Alerting rules ────────────────────────────────────────────────────────────
# Stored in /etc/prometheus/rules/membra.yml (managed separately)

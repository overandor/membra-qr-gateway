global:
  # Default SMTP config (override per receiver)
  smtp_from: alerts@membra.io
  smtp_smarthost: smtp.sendgrid.net:587
  smtp_auth_username: apikey
  smtp_auth_password: "${SENDGRID_API_KEY}"
  smtp_require_tls: true
  resolve_timeout: 5m

# ── Routing ───────────────────────────────────────────────────────────────────
route:
  group_by: [alertname, severity, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default-receiver

  routes:
    # Critical alerts → PagerDuty (immediate)
    - matchers:
        - severity = critical
      receiver: pagerduty
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Critical also → Slack
    - matchers:
        - severity = critical
      receiver: slack-critical
      group_wait: 10s
      repeat_interval: 2h

    # Warning alerts → Slack
    - matchers:
        - severity = warning
      receiver: slack-warning
      group_wait: 2m
      repeat_interval: 6h

    # Security alerts → dedicated channel
    - matchers:
        - category = security
      receiver: slack-security
      group_wait: 10s
      repeat_interval: 30m
      continue: true

    # Info/daily digests → email only
    - matchers:
        - severity = info
      receiver: email-team
      group_wait: 10m
      repeat_interval: 24h

# ── Inhibit rules ─────────────────────────────────────────────────────────────
inhibit_rules:
  # If API is down, suppress downstream latency/error-rate alerts
  - source_matchers:
      - alertname = APIDown
    target_matchers:
      - service = membra-api
    equal: [service]

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  - name: default-receiver
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#membra-alerts"
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: |
          *Service:* {{ .GroupLabels.service }}
          *Severity:* {{ .GroupLabels.severity }}
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}

  - name: pagerduty
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: "{{ .GroupLabels.severity }}"
        description: "{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}"
        client: "MEMBRA Alertmanager"
        client_url: "https://grafana.membra.io"
        details:
          service: "{{ .GroupLabels.service }}"
          environment: "production"

  - name: slack-critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#membra-incidents"
        color: "danger"
        title: "CRITICAL: {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true

  - name: slack-warning
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#membra-alerts"
        color: "warning"
        title: "WARNING: {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  - name: slack-security
    slack_configs:
      - api_url: "${SLACK_SECURITY_WEBHOOK_URL}"
        channel: "#membra-security"
        color: "danger"
        title: "SECURITY ALERT: {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: false

  - name: email-team
    email_configs:
      - to: engineering@membra.io
        subject: "[MEMBRA] {{ .GroupLabels.alertname }}"
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Status: {{ .Status }}

          {{ range .Alerts }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

# ─────────────────────────────────────────────────────────────────────────────
# MEMBRA QR Gateway — Nginx Rate Limiting Zones
# Included at http {} level in nginx.conf
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limit zones ──────────────────────────────────────────────────────────
# Zone definitions live here; limit_req directives go in location blocks.
#
# Format: zone=<name>:<size> rate=<n>r/<unit>
#   - 10m = ~160k unique IPs stored in memory
#   - $binary_remote_addr = 4 bytes IPv4 / 16 bytes IPv6 (compact)

# General API zone: 100 req/min per IP
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/m;

# Auth zone: 10 req/min per IP (login, register)
limit_req_zone $binary_remote_addr zone=auth_zone:5m rate=10r/m;

# Admin zone: 50 req/min per IP
limit_req_zone $binary_remote_addr zone=admin_zone:5m rate=50r/m;

# Webhook zone: 300 req/min per IP (Stripe/Membra send bursts)
limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=300r/m;

# QR scan zone: 60 req/min per IP
limit_req_zone $binary_remote_addr zone=qr_zone:5m rate=60r/m;

# ── Connection limits ─────────────────────────────────────────────────────────
# Max simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
limit_conn conn_zone 50;

# ── Rate limit responses ──────────────────────────────────────────────────────
# Return 429 instead of default 503
limit_req_status 429;
limit_conn_status 429;

# Log rate limit violations
limit_req_log_level warn;
limit_conn_log_level warn;

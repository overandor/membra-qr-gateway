# ─────────────────────────────────────────────────────────────────────────────
# MEMBRA QR Gateway — Nginx Security Headers
# Include in server {} blocks: include /etc/nginx/snippets/security-headers.conf;
# ─────────────────────────────────────────────────────────────────────────────

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Enable browser XSS filter (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS — 1 year, include subdomains, preload
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Restrict browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), magnetometer=(), gyroscope=()" always;

# Content Security Policy
# Adjust connectSrc when adding third-party APIs
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.devnet.solana.com https://api.mainnet-beta.solana.com wss://api.devnet.solana.com wss://api.mainnet-beta.solana.com https://api.stripe.com; frame-src https://js.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# Prevent caching of sensitive API responses (override per-location as needed)
add_header Cache-Control "no-store" always;

# Remove server identification
# (server_tokens off is set in nginx.conf — this adds extra protection)
add_header X-Powered-By "" always;

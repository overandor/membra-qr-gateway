# ─────────────────────────────────────────────────────────────────────────────
# MEMBRA QR Gateway — Production Nginx Configuration
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Rate limiting (see rate-limit.conf) ───────────────────────────────────
    include /etc/nginx/snippets/rate-limit.conf;

    # ── Upstream: FastAPI backend ──────────────────────────────────────────────
    upstream api_backend {
        server api:7860;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow certbot ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.membra.io;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/app.membra.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.membra.io/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # ── Security headers ──────────────────────────────────────────────────
        include /etc/nginx/snippets/security-headers.conf;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── Auth endpoints (tighter rate limit) ───────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Webhooks (higher body size limit) ─────────────────────────────────
        location /api/webhooks/ {
            limit_req zone=webhook_zone burst=50 nodelay;

            client_max_body_size 1m;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Stripe-Signature $http_stripe_signature;
            proxy_set_header Connection "";
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Static frontend files ─────────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # SPA fallback — all routes served by index.html
            try_files $uri $uri/ /index.html;

            # Cache static assets (JS/CSS bundles have content-hash names)
            location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # index.html: no cache (always revalidate)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }
    }
}
